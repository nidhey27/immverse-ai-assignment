# Service type: NodePort (chosen for demo/testing without a cloud provider)
# To use on AWS EKS with an ELB, change type to LoadBalancer and remove nodePort.
apiVersion: v1
kind: Service
metadata:
  name: sample-app-svc
  labels:
    app: sample-app
spec:
  type: NodePort
  selector:
    app: sample-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
