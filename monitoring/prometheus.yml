# prometheus.yml
# Scrapes the sample-app pods via Kubernetes service discovery.
# Deploy this as a ConfigMap in your cluster alongside Prometheus.

global:
  scrape_interval: 15s          # how often to scrape targets
  evaluation_interval: 15s      # how often to evaluate alert rules

# Alert rules file (optional — create alerts.yml separately)
# rule_files:
#   - "alerts.yml"

scrape_configs:

  # --- Prometheus self-monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --- Kubernetes pod auto-discovery ---
  # Scrapes any pod with the annotation prometheus.io/scrape: "true"
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # Only scrape pods with the annotation enabled
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      # Use the annotated path (default /metrics)
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      # Use the annotated port
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      # Carry pod name and namespace as labels
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

  # --- cAdvisor: container CPU / memory metrics ---
  # Requires cAdvisor deployed as a DaemonSet (standard on EKS)
  - job_name: 'cadvisor'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
